services:
  - type: web
    name: civic-connect-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_SSL
        value: "true"
      # Set these manually in the Render dashboard:
      # DB_HOST, DB_PORT, DB_USER, DB_PASS, DB_NAME
      # JWT_SECRET, CLIENT_URL
      # GMAIL_USER, GMAIL_PASS
