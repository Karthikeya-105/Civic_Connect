services:
  - type: web
    name: civic-connect-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: civic-connect-db
          property: connectionString
      # Set these manually in Render dashboard:
      # JWT_SECRET, CLIENT_URL, GMAIL_USER, GMAIL_PASS

databases:
  - name: civic-connect-db
    plan: free
    databaseName: civic_connect
